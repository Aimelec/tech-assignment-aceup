services:
  frontend:
    build:
      context: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend
    networks:
      - aceup

  backend:
    build:
      context: ./backend
    working_dir: /rails
    command: ["./bin/rails", "server", "-b", "0.0.0.0"]
    volumes:
      - ./backend:/rails
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - db
      - redis
    networks:
      - aceup

  sidekiq:
    build:
      context: ./backend
    working_dir: /rails
    command: ["bundle", "exec", "sidekiq"]
    volumes:
      - ./backend:/rails
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    networks:
      - aceup

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_DB=${DATABASE_NAME:-aceup_db}
      - POSTGRES_USER=${DATABASE_USERNAME:-postgres}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - aceup

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    networks:
      - aceup

volumes:
  db_data:

networks:
  aceup:
    driver: bridge
